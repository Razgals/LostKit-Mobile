name: losthq_client
description: LostHQ Mobile Client - 2004 RuneScape Browser
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  gal: ^2.3.0   
  audioplayers: ^6.1.0
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/skillicons/
    - assets/sounds/
    - assets/afktimer.png
    - assets/zoom.png

  fonts:
    - family: RuneScape
      fonts:
        - asset: assets/fonts/Runescape-Bold-12.otf
          weight: 700

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
